<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
    <title>点数・重量計算</title>
    <link rel="stylesheet" href="styles.css" />
    <style>
      .app-header {
  position: sticky;
  top: 0;
  z-index: 110;
  background: var(--accent);
}

.summary-card {
 
  position: sticky;
  top: 56px; 
  z-index: 100;
}
      .summary-card {
        display: grid;
        grid-template-columns: 1fr 1px 1fr;
        gap: 10px;
        align-items: center;
        padding: 20px;
      }
      .summary-col { display: flex; flex-direction: column; gap: 8px; }
      .summary-divider { background-color: var(--border); height: 100%; width: 1px; }
      .summary-item { display: flex; justify-content: space-between; font-size: 0.95rem; }
      .summary-item strong { color: var(--accent-2); font-size: 1.1rem; }
    </style>
  </head>
  <body>
    <div id="app">
      <header class="app-header">
        <div class="header-inner">
          <h1>点数・重量計算</h1>
          <button id="refreshMasterBtn" class="btn-secondary">マスタを更新</button>
        </div>
      </header>

      <main class="app-main">
        <section class="summary-card">
          <div class="summary-col">
            <div class="summary-item"><span>点数(常温):</span><strong id="totalPointsRoom">0</strong></div>
            <div class="summary-item"><span>点数(冷蔵):</span><strong id="totalPointsCold">0</strong></div>
          </div>
          <div class="summary-divider"></div>
          <div class="summary-col">
            <div class="summary-item"><span>重量(常温):</span><strong id="totalWeight">0 g</strong></div>
            <div class="summary-item"><span>重量(冷蔵):</span><strong id="totalWeightCold">0 g</strong></div>
          </div>
        </section>

        <section class="section">
          <header class="section-header">
            <h2>入力エリア</h2>
            <button id="resetCountsBtn" class="btn-secondary">リセット</button>
          </header>
          <div id="productsContainer" class="products-grid"></div>
        </section>
      </main>
    </div>
    <script src="common.js"></script>
    <script src="sales.js"></script>
  </body>
</html>
