<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
    <title>運用側・マスタ管理</title>
    <link rel="stylesheet" href="styles.css" />
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <style>
      #app { max-width: 100% !important; margin: 0; padding: 10px 20px; }
      .app-main { max-width: 100% !important; }
      .table-wrapper {
        height: calc(100vh - 200px);
        min-height: 600px;
        overflow-y: auto;
        overflow-x: hidden;
        border: 1px solid #eee;
        border-radius: 8px;
        background: #fff;
      }
      .product-table { width: 100%; table-layout: fixed; border-collapse: collapse; }
      .product-table th, .product-table td { 
        padding: 8px 5px; 
        border: 1px solid #eee; 
        vertical-align: middle;
      }
      .product-table th { 
        position: sticky; top: 0; background: #eee; z-index: 10;
        border-bottom: 2px solid #ccc;
        text-align: center;
      }
      .col-del { width: 5%; text-align: center; }
      .col-move { width: 5%; text-align: center; }
      .col-name { width: 40%; text-align: left; }
      .col-cat { width: 11%; text-align: left; }
      .col-pts { width: 12%; text-align: left; }
      .col-wgt { width: 12%; text-align: left; }
      .col-type { width: 15%; text-align: left; }
      
      .td-center { text-align: center; }
      
      .handle { cursor: grab; color: #999; font-size: 1.2rem; user-select: none; }
      .handle:active { cursor: grabbing; }
      .sortable-ghost { opacity: 0.3; background: #f0f7ff; }
      
      .table-input { 
        width: 100%; 
        padding: 8px 6px; 
        border: 1px solid #ddd; 
        border-radius: 4px; 
        font-size: 1rem;
        box-sizing: border-box;
      }
      .column-delete-btn { 
        width: 28px; 
        height: 28px; 
        padding: 0; 
        display: inline-flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        line-height: 1;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <header class="app-header">
        <div class="header-inner">
          <h1>運用側・マスタ管理</h1>
          <button id="importMasterBtn" class="btn-secondary">data.json を読み込む</button> 
          <button id="exportMasterBtn" class="btn-primary">data.json をダウンロード</button>
        </div>
      </header>
      <main id="adminMain" class="app-main">
        <section class="section">
          <header class="subsection-header">
            <h2>商品マスタ</h2>
            <button id="addProductBtn" class="btn-secondary">商品を追加</button>
          </header>
          <div class="table-wrapper">
            <table class="product-table">
              <thead>
                <tr>
                  <th class="col-del">削除</th>
                  <th class="col-move">移動</th>
                  <th class="col-name">商品名</th>
                  <th class="col-cat">カテゴリ</th>
                  <th class="col-pts">点数</th>
                  <th class="col-wgt">重量(g)</th>
                  <th class="col-type">区分</th>
                </tr>
              </thead>
              <tbody id="productTableBody"></tbody>
            </table>
          </div>
        </section>
      </main>
    </div>
    <script src="common.js"></script>
    <script src="admin.js"></script>
  </body>
</html>
